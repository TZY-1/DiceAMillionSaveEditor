name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DiceAMillionSaveEditor.slnx

      - name: Publish (win-x64)
        run: dotnet publish DiceAMillionSaveEditor.UI/DiceAMillionSaveEditor.UI.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64

      - name: Create ZIP package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "manual"
          }
          $zipName = "DiceAMillionSaveEditor-$version-win-x64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-win-x64
          path: ${{ env.ZIP_NAME }}

      - name: Create/Update GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
